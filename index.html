<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Средняя цена скинов CSGO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
body{
font-family:Arial,sans-serif;
margin:20px;
max-width:1400px;
margin:auto;
}

select,button{
padding:8px;
margin:8px;
}

#difference{
font-weight:bold;
color:#e74c3c;
font-size:1.3em;
}

#tmomSpread{
font-weight:bold;
color:#27ae60;
font-size:1.2em;
}

#chartContainer{
height:600px;
width:100%;
position:relative;
}

#selectionBox{
position:absolute;
border:2px dashed #3498db;
background:rgba(52,152,219,0.15);
pointer-events:none;
display:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:6px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#f5f5f5;
}

.green{
color:#27ae60;
font-weight:bold;
}

.red{
color:#e74c3c;
font-weight:bold;
}
</style>
</head>

<body>

<h1>Средняя цена скинов CSGO</h1>

<label>Таймфрейм:</label>

<select id="timeframe" onchange="updateChart()">
<option value="all">Всё время</option>
<option value="week">Последняя неделя</option>
<option value="24h">Последние 24 часа</option>
<option value="hour">Последний час</option>
</select>

<button onclick="resetSelection()">Сбросить выделение</button>

<div id="chartContainer">

<canvas id="pricesChart"></canvas>
<div id="selectionBox"></div>

</div>

<p>Спред: <span id="difference">0.00%</span></p>
<p>Спред с ТМОМ: <span id="tmomSpread">0.00%</span></p>

<h2>Спред по каждому ножу</h2>

<table id="knifeTable">

<thead>
<tr>
<th>Нож</th>
<th>Цена Лист1</th>
<th>Цена TMOM</th>
<th>Спред</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

const API_KEY='AIzaSyDifgZJ9eXtgsmnEML385TpGC4j-MXdUt8'

const SPREADSHEET_ID='1bpGUwuJa3FmPiYftfS-Yn7_gQlRpZNuJkFYSQ-d9zcQ'

const SHEET_NAME='Лист1'
const SHEET2_NAME='Лист3'

let chart
let rawSnapshots=[]

let isDragging=false
let startX,startY

async function fetchData(){

if(rawSnapshots.length>0)return rawSnapshots

const url=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A:A?key=${API_KEY}`

const res=await fetch(url)

const data=await res.json()

rawSnapshots=data.values?data.values.slice(1):[]

return rawSnapshots

}

async function fetchLastRow(sheet){

const url=`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheet}!A:A?key=${API_KEY}`

const res=await fetch(url)

const data=await res.json()

if(!data.values||data.values.length<2)return null

const last=data.values[data.values.length-1][0]

try{

return JSON.parse(last)

}catch{

return null

}

}

function filterByTimeframe(data,timeframe){

const now=Date.now()

let cutoff

switch(timeframe){

case'week':cutoff=now-7*24*60*60*1000;break
case'24h':cutoff=now-24*60*60*1000;break
case'hour':cutoff=now-60*60*1000;break
default:return data

}

return data.filter(row=>{

try{

const obj=JSON.parse(row[0])

return Date.parse(obj.timestamp)>=cutoff

}catch{return false}

})

}

function getAveragePrice(prices){

const valid=Object.values(prices).filter(v=>v!==null&&typeof v==='number')

return valid.length?valid.reduce((a,b)=>a+b,0)/valid.length:null

}

function getAverageTMOM(items){

const prices=Object.values(items)
.map(v=>v.price_usd)
.filter(v=>v!==null)

return prices.length?prices.reduce((a,b)=>a+b,0)/prices.length:null

}

function resetSelection(){

const selectionBox=document.getElementById('selectionBox')

selectionBox.style.display='none'

document.getElementById('difference').textContent='0.00%'

}

async function updateTMOMSpread(){

const sheet1=await fetchLastRow(SHEET_NAME)
const sheet2=await fetchLastRow(SHEET2_NAME)

if(!sheet1||!sheet2)return

const avg1=getAveragePrice(sheet1.prices)
const avg2=getAverageTMOM(sheet2.items)

const diff=((avg2-avg1)/avg1)*100

document.getElementById('tmomSpread').textContent=diff.toFixed(2)+'%'

updateKnifeTable(sheet1.prices,sheet2.items)

}

function updateKnifeTable(prices1,items2){

const tbody=document.querySelector('#knifeTable tbody')

tbody.innerHTML=''

Object.entries(prices1).forEach(([name,price1])=>{

let price2=null

for(let item of Object.values(items2)){

if(item.name===name){

price2=item.price_usd
break

}

}

if(price2===null)return

const diff=((price2-price1)/price1)*100

const row=document.createElement('tr')

row.innerHTML=`
<td>${name}</td>
<td>$${price1.toFixed(2)}</td>
<td>$${price2.toFixed(2)}</td>
<td class="${diff>0?'green':'red'}">${diff.toFixed(2)}%</td>
`

tbody.appendChild(row)

})

}

async function updateChart(){

const timeframe=document.getElementById('timeframe').value

const data=await fetchData()

const filtered=filterByTimeframe(data,timeframe)

const labels=[]
const averages=[]

let previousPrices=null

filtered.forEach(row=>{

try{

const snapshot=JSON.parse(row[0])

labels.push(snapshot.timestamp)

let currentPrices=snapshot.prices

if(previousPrices){

for(let key in currentPrices){

if(currentPrices[key]===null&&previousPrices[key]){

currentPrices[key]=previousPrices[key]

}

}

}

previousPrices={...currentPrices}

const avg=getAveragePrice(currentPrices)

averages.push(avg??0)

}catch{}

})

const ctx=document.getElementById('pricesChart').getContext('2d')

if(chart)chart.destroy()

chart=new Chart(ctx,{

type:'line',

data:{
labels,
datasets:[{
label:'Средняя цена',
data:averages,
borderColor:'#3498db',
backgroundColor:'rgba(52,152,219,0.1)',
tension:0.2,
fill:true
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
scales:{y:{beginAtZero:false}},
interaction:{intersect:false}
}

})

setupSelection()

updateTMOMSpread()

}

function setupSelection(){

const canvas=document.getElementById('pricesChart')

const selectionBox=document.getElementById('selectionBox')

canvas.onmousedown=(e)=>{

if(e.button!==0)return

isDragging=true

const rect=canvas.getBoundingClientRect()

startX=e.clientX-rect.left
startY=e.clientY-rect.top

selectionBox.style.left=startX+'px'
selectionBox.style.top=startY+'px'
selectionBox.style.width='0px'
selectionBox.style.height='0px'
selectionBox.style.display='block'

}

canvas.onmousemove=(e)=>{

if(!isDragging)return

const rect=canvas.getBoundingClientRect()

const currX=e.clientX-rect.left
const currY=e.clientY-rect.top

selectionBox.style.width=Math.abs(currX-startX)+'px'
selectionBox.style.height=Math.abs(currY-startY)+'px'

selectionBox.style.left=Math.min(startX,currX)+'px'
selectionBox.style.top=Math.min(startY,currY)+'px'

}

canvas.onmouseup=(e)=>{

if(!isDragging)return

isDragging=false

const rect=canvas.getBoundingClientRect()

const endY=e.clientY-rect.top

const yScale=chart.scales.y

const upperValue=yScale.getValueForPixel(Math.min(startY,endY))
const lowerValue=yScale.getValueForPixel(Math.max(startY,endY))

if(lowerValue<=0||upperValue<=lowerValue){

document.getElementById('difference').textContent='0.00%'

return

}

const diff=((upperValue-lowerValue)/lowerValue)*100

document.getElementById('difference').textContent=diff.toFixed(2)+'%'

}

canvas.onmouseleave=()=>{

if(isDragging){

isDragging=false

selectionBox.style.display='none'

}

}

}

updateChart()

</script>

</body>
</html>
