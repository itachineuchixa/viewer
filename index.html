<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Средняя цена скинов CSGO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 1400px; margin: auto; }
        select, button { padding: 8px; margin: 8px; }
        #difference { font-weight: bold; color: #e74c3c; font-size: 1.2em; }
        #chartContainer { height: 600px; width: 100%; }
    </style>
</head>
<body>
    <h1>Средняя цена скинов CSGO</h1>

    <label>Таймфрейм:</label>
    <select id="timeframe" onchange="updateChart()">
        <option value="all">Всё время</option>
        <option value="week">Последняя неделя</option>
        <option value="24h">Последние 24 часа</option>
        <option value="hour">Последний час</option>
    </select>

    <button onclick="resetZoom()">Сбросить выделение</button>

    <div id="chartContainer">
        <canvas id="pricesChart"></canvas>
    </div>

    <p>Разница в выделенной зоне: <span id="difference">0.00%</span></p>

    <script>
        const API_KEY = 'AIzaSyDifgZJ9eXtgsmnEML385TpGC4j-MXdUt8';

        const SPREADSHEET_ID = '1bpGUwuJa3FmPiYftfS-Yn7_gQlRpZNuJkFYSQ-d9zcQ';
        const SHEET_NAME = 'Лист1'; // ← подставь сюда то, что работает

        let chart;
        let rawSnapshots = [];

        async function fetchData() {
            if (rawSnapshots.length > 0) return rawSnapshots;

            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A:A?key=${API_KEY}`;

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                rawSnapshots = data.values ? data.values.slice(1) : [];
                return rawSnapshots;
            } catch (err) {
                console.error('Ошибка:', err);
                alert('Ошибка загрузки данных');
                return [];
            }
        }

        function filterByTimeframe(data, timeframe) {
            const now = Date.now();
            let cutoff;
            switch (timeframe) {
                case 'week':  cutoff = now - 7*24*60*60*1000; break;
                case '24h':   cutoff = now - 24*60*60*1000; break;
                case 'hour':  cutoff = now - 60*60*1000; break;
                default: return data;
            }
            return data.filter(row => {
                try {
                    const obj = JSON.parse(row[0]);
                    return Date.parse(obj.timestamp) >= cutoff;
                } catch { return false; }
            });
        }

        function getAveragePrice(prices) {
            const valid = Object.values(prices).filter(v => v !== null && typeof v === 'number');
            return valid.length ? valid.reduce((a,b)=>a+b,0) / valid.length : null;
        }

        function resetZoom() {
            if (chart) {
                chart.resetZoom();
                document.getElementById('difference').textContent = '0.00%';
            }
        }

        async function updateChart() {
            const timeframe = document.getElementById('timeframe').value;
            const data = await fetchData();
            const filtered = filterByTimeframe(data, timeframe);

            const labels = [];
            const averages = [];

            filtered.forEach(row => {
                try {
                    const snapshot = JSON.parse(row[0]);
                    labels.push(snapshot.timestamp);
                    const avg = getAveragePrice(snapshot.prices);
                    averages.push(avg ?? 0);
                } catch {}
            });

            const ctx = document.getElementById('pricesChart').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Средняя цена',
                        data: averages,
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52,152,219,0.1)',
                        tension: 0.2,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: false }
                    },
                    plugins: {
                        zoom: {
                            zoom: {
                                wheel: { enabled: false },
                                pinch: { enabled: false },
                                mode: 'xy',
                                drag: {
                                    enabled: true,
                                    backgroundColor: 'rgba(54, 162, 235, 0.2)',
                                    borderColor: 'rgba(54, 162, 235, 0.8)',
                                    borderWidth: 1,
                                    modifierKey: null // без Ctrl/Shift — просто зажимай ЛКМ и тяни
                                },
                                onZoomComplete({chart}) {
                                    // После завершения выделения считаем разницу
                                    const {x, y} = chart.zoom.scales;
                                    const minY = y.min;
                                    const maxY = y.max;
                                    const diffPercent = ((maxY - minY) / minY) * 100;
                                    document.getElementById('difference').textContent = 
                                        diffPercent.toFixed(2) + '%';
                                }
                            },
                            pan: {
                                enabled: true,
                                mode: 'xy'
                            }
                        },
                        legend: { display: true }
                    }
                }
            });
        }

        // Запуск
        updateChart();
    </script>
</body>
</html>
